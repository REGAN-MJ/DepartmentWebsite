<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>
<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, Arial, sans-serif;
background:#f4f7fb;
padding:40px;
}

.logo{
display:block;
margin:auto;
width:120px;
margin-bottom:15px;
}

h2{
text-align:center;
color:navy;
margin-bottom:25px;
letter-spacing:1px;
}

form{
max-width:650px;
margin:auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

label{
font-weight:600;
color:#333;
display:block;
margin-top:15px;
margin-bottom:5px;
}

input, select, textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

input:focus, select:focus, textarea:focus{
outline:none;
border-color:navy;
box-shadow:0 0 5px rgba(0,0,128,0.2);
}

.gender-group{
display:flex;
gap:20px;
margin-top:8px;
}

.checkbox-group{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:8px;
}

.checkbox-group label{
font-weight:normal;
}

input[type="radio"], input[type="checkbox"]{
width:auto;
margin-right:6px;
}

button{
margin-top:25px;
width:100%;
padding:14px;
background:navy;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#001f5c;
}
.file-upload{
position:relative;
}

.file-upload input{
opacity:0;
position:absolute;
width:100%;
height:100%;
cursor:pointer;
}

.upload-btn{
display:inline-block;
padding:10px 18px;
background:navy;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.upload-btn:hover{
background:#001f5c;
}

</style>
</head>

<body>

<img src="image/bugema-university-seeklogo.png" class="logo">

   <!-- Hamburger -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Navigation -->
  <nav class="nav-menu" id="nav-menu">
    <a href="index.html" data-icon="🏠"class="courses-btn">Home</a>
    <a href="courses.html" data-icon="📚" class="courses-btn">Courses</a>
    <a href="staff.html" data-icon="ℹ️" class="courses-btn">Staff</a>
    <a href="timetable.html" data-icon="✉️" class="courses-btn">Timetable</a>
    <a href="alumni.html" data-icon="👨‍🎓" class="courses-btn">Alumini</a>
    <a href="https://web.whatsapp.com/" data-icon="✉️" class="courses-btn">Contact Us</a>
  </nav>

<h2>STUDENT REGISTRATION FORM</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="John Doe" required>

<label>Email Address</label>
<input type="email" placeholder="example@email.com" required>

<label>Phone Number</label>
<input type="tel" placeholder="+256 700 000000" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Gender</label>
<div class="gender-group">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
</div>

<label>Upload Previous Academic Documents</label>

<div class="file-upload">
<input type="file" id="documents" name="documents" multiple
accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
<label for="documents" class="upload-btn">Choose Files</label>
</div>

<small style="color:#666;">Accepted formats: PDF, JPG, PNG, DOC</small>

<label>Course Program</label>
<select required>
<option value="">Select Program</option>
<option>BSc Software Engineering</option>
<option>BSc Computer Science</option>
<option>BSc Information Technology</option>
<option>Bachelor of Business Administration</option>
<option>BSc Data Science</option>
</select>


<label>Course Units</label>

<div class="checkbox-group">

<label><input type="checkbox"> Database Systems</label>

<label><input type="checkbox"> Website Development</label>

<label><input type="checkbox"> Programming Fundamentals</label>

<label><input type="checkbox"> Engineering Ethics</label>

<label><input type="checkbox"> Data Structures</label>

<label><input type="checkbox"> Computer Networks</label>

</div>


<label>Address</label>
<textarea rows="3" placeholder="Street, City, District"></textarea>


<label>Country</label>
<select>
<option value="">Select Country</option>
<option>Uganda</option>
<option>Kenya</option>
<option>Tanzania</option>
<option>Rwanda</option>
<option>Other</option>
</select>

<button type="submit">REGISTER</button>

</form>

<script src="department.js"></script>

</body>
</html>
